version: "3.9"

services:

  # -------------------------
  # PostgreSQL Database
  # -------------------------
  postgres:
    image: postgres:15
    container_name: insightflow-postgres
    restart: always
    environment:
      POSTGRES_USER: insight
      POSTGRES_PASSWORD: insightpass
      POSTGRES_DB: insightdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # -------------------------
  # Kafka + Zookeeper
  # -------------------------
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: insightflow-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: insightflow-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  # -------------------------
  # MLflow Tracking Server
  # -------------------------
  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    container_name: insightflow-mlflow
    ports:
      - "5000:5000"
    command: >
      mlflow server
      --backend-store-uri sqlite:///mlflow.db
      --default-artifact-root /mlruns
      --host 0.0.0.0
    volumes:
      - mlflow_data:/mlruns

  # -------------------------
  # Backend API
  # -------------------------
  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    container_name: insightflow-backend
    depends_on:
      - postgres
      - kafka
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://insight:insightpass@postgres:5432/insightdb
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      MLFLOW_TRACKING_URI: http://mlflow:5000

  # -------------------------
  # Frontend React App
  # -------------------------
  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    container_name: insightflow-frontend
    depends_on:
      - backend
    ports:
      - "5173:5173"

  # -------------------------
  # Airflow Scheduler
  # -------------------------
  airflow:
    build:
      context: .
      dockerfile: docker/airflow.Dockerfile
    container_name: insightflow-airflow
    depends_on:
      - postgres
      - kafka
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://insight:insightpass@postgres:5432/insightdb
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
    ports:
      - "8080:8080"
    volumes:
      - ./pipelines/airflow_dags:/opt/airflow/dags

volumes:
  postgres_data:
  mlflow_data: